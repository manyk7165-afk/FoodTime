<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Люля-кебаб | Фуд Тайм</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Unbounded:wght@500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --text: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.74);
      --soft: rgba(255,255,255,0.48);
      --glass: rgba(255,255,255,0.07);
      --glass-strong: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.12);
      --shadow: 0 18px 40px rgba(0,0,0,0.24);
      --button: linear-gradient(135deg, #18b7ff 0%, #7b61ff 100%);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 22%, rgba(255, 0, 128, 0.15), transparent 22%),
        radial-gradient(circle at 86% 14%, rgba(123, 97, 255, 0.20), transparent 24%),
        radial-gradient(circle at 52% 75%, rgba(0, 255, 200, 0.07), transparent 26%),
        radial-gradient(circle at 72% 58%, rgba(255, 140, 0, 0.06), transparent 18%),
        linear-gradient(135deg, #040506 0%, #090811 24%, #140914 50%, #0a1020 76%, #040506 100%);
      color: var(--text);
      padding: 22px;
    }

    .page {
      max-width: 1460px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topbar,
    .section-block {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(22px);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brand-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 24px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .back-link,
    .cart-order-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 138px;
      padding: 13px 18px;
      border-radius: 16px;
      text-decoration: none;
      color: white;
      font-weight: 800;
      font-size: 15px;
      background: var(--button);
      box-shadow: 0 12px 24px rgba(0,0,0,0.20);
      border: 0;
      cursor: pointer;
    }

    .section-block {
      padding: 18px;
    }

    .mini-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 8px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      line-height: 1;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .section-note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 14px;
    }

    .product-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.14);
      overflow: hidden;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
    }

    .product-card-image {
      width: 100%;
      height: 130px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.38);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .product-card-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .product-card-price {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 14px;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty button {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .qty span {
      min-width: 24px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
    }

    .cart-float {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 999;
    }

    .cart-button {
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(135deg, #18b7ff 0%, #7b61ff 100%);
      color: #fff;
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(0,0,0,0.28);
    }

    .cart-panel {
      display: none;
      margin-top: 12px;
      width: 320px;
      max-height: 420px;
      overflow: auto;
      padding: 16px;
      border-radius: 22px;
      background: rgba(20, 20, 30, 0.88);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(22px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .cart-panel.open {
      display: block;
    }

    .cart-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .cart-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .cart-item-name {
      font-size: 14px;
      font-weight: 700;
    }

    .cart-item-meta {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      margin-top: 4px;
    }

    .cart-empty {
      color: rgba(255,255,255,0.65);
      font-size: 14px;
    }

    .cart-total {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 16px;
      font-weight: 800;
    }

    @media (max-width: 1180px) {
      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 16px;
      }

      .topbar,
      .section-block {
        padding: 14px;
      }

      .product-grid {
        grid-template-columns: 1fr;
      }

      .back-link,
      .cart-order-btn {
        width: 100%;
      }

      .cart-float {
        right: 14px;
        bottom: 14px;
      }

      .cart-panel {
        width: min(88vw, 320px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-title">Фуд Тайм</div>
        <div class="brand-subtitle">premium food service</div>
      </div>

      <a href="index.html" class="back-link">Назад</a>
    </div>

    <section class="section-block">
      <div class="mini-label">Категория</div>
      <div class="section-title">Люля-кебаб</div>
      <div class="section-note">
        Выберите нужную позицию и добавьте её в корзину.
      </div>

      <div class="product-grid">
        <div class="product-card" data-name="Люля-кебаб из свинины" data-price="340">
          <div>
            <div class="product-card-image">Фото</div>
            <div class="product-card-title">Люля-кебаб из свинины</div>
            <div class="product-card-price">340 ₽</div>
          </div>
          <div class="qty">
            <button onclick="changeQty(this, -1)">-</button>
            <span>0</span>
            <button onclick="changeQty(this, 1)">+</button>
          </div>
        </div>

        <div class="product-card" data-name="Люля-кебаб из курицы" data-price="320">
          <div>
            <div class="product-card-image">Фото</div>
            <div class="product-card-title">Люля-кебаб из курицы</div>
            <div class="product-card-price">320 ₽</div>
          </div>
          <div class="qty">
            <button onclick="changeQty(this, -1)">-</button>
            <span>0</span>
            <button onclick="changeQty(this, 1)">+</button>
          </div>
        </div>

        <div class="product-card" data-name="Люля-кебаб из говядины" data-price="360">
          <div>
            <div class="product-card-image">Фото</div>
            <div class="product-card-title">Люля-кебаб из говядины</div>
            <div class="product-card-price">360 ₽</div>
          </div>
          <div class="qty">
            <button onclick="changeQty(this, -1)">-</button>
            <span>0</span>
            <button onclick="changeQty(this, 1)">+</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="cart-float">
    <button class="cart-button" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>

    <div class="cart-panel" id="cartPanel">
      <div class="cart-title">Корзина</div>
      <div class="cart-items" id="cartItems">
        <div class="cart-empty">Пока пусто</div>
      </div>
      <div class="cart-total">Итого: <span id="cartTotal">0 ₽</span></div>
      <button class="cart-order-btn" style="margin-top:12px;">Оформить</button>
    </div>
  </div>

  <script>
    const cart = {};

    function changeQty(button, delta) {
      const card = button.closest('.product-card');
      if (!card) return;

      const name = card.dataset.name || 'Товар';
      const price = Number(card.dataset.price || 0);
      const qtyEl = card.querySelector('.qty span');

      let qty = Number(qtyEl.textContent || 0);
      qty = Math.max(0, qty + delta);
      qtyEl.textContent = qty;

      if (qty === 0) {
        delete cart[name];
      } else {
        cart[name] = { price, qty };
      }

      updateCart();
    }

    function updateCart() {
      const cartItems = document.getElementById('cartItems');
      const cartCount = document.getElementById('cartCount');
      const cartTotal = document.getElementById('cartTotal');

      const entries = Object.entries(cart);
      let totalCount = 0;
      let totalPrice = 0;

      entries.forEach(([name, item]) => {
        totalCount += item.qty;
        totalPrice += item.qty * item.price;
      });

      cartCount.textContent = totalCount;
      cartTotal.textContent = totalPrice + ' ₽';

      if (!entries.length) {
        cartItems.innerHTML = '<div class="cart-empty">Пока пусто</div>';
        return;
      }

      cartItems.innerHTML = entries.map(([name, item]) => `
        <div class="cart-item">
          <div>
            <div class="cart-item-name">${name}</div>
            <div class="cart-item-meta">${item.qty} × ${item.price} ₽</div>
          </div>
          <div class="cart-item-name">${item.qty * item.price} ₽</div>
        </div>
      `).join('');
    }

    function toggleCart() {
      document.getElementById('cartPanel').classList.toggle('open');
    }
  </script>
</body>
</html>
