<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Овощи | Фуд Тайм</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Unbounded:wght@500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.74);
      --soft: rgba(255,255,255,0.48);
      --glass: rgba(255,255,255,0.07);
      --glass-strong: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.12);
      --shadow: 0 18px 40px rgba(0,0,0,0.24);
      --button: linear-gradient(135deg, #18b7ff 0%, #7b61ff 100%);
    }

    body {
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 22%, rgba(255, 0, 128, 0.15), transparent 22%),
        radial-gradient(circle at 86% 14%, rgba(123, 97, 255, 0.20), transparent 24%),
        radial-gradient(circle at 52% 75%, rgba(0, 255, 200, 0.07), transparent 26%),
        radial-gradient(circle at 72% 58%, rgba(255, 140, 0, 0.06), transparent 18%),
        linear-gradient(135deg, #040506 0%, #090811 24%, #140914 50%, #0a1020 76%, #040506 100%);
      color: var(--text);
      padding: 22px;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topbar, .section-block {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(22px);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brand-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 24px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      font-weight: 800;
      background: var(--button);
    }

    .mini-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 8px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .section-note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--glass-strong);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 14px;
      min-height: 240px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: var(--shadow);
    }

    .card-image {
      width: 100%;
      height: 120px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.38);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .card-price {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 12px;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty button {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .qty span {
      min-width: 24px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
    }

    @media (max-width: 980px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 520px) {
      .cards { grid-template-columns: 1fr; }
      .section-title { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-title">Фуд Тайм</div>
        <div class="brand-subtitle">premium food service</div>
      </div>
      <a href="index.html" class="back-link">Назад</a>
    </div>

    <section class="section-block">
      <div class="mini-label">Категория</div>
      <div class="section-title">Овощи</div>
      <div class="section-note">Здесь будут блюда категории «Овощи».</div>

      <div class="cards">
        <div class="card"><div><div class="card-image">Фото</div><div class="card-title">Блюдо 1</div><div class="card-price">0 ₽</div></div><div class="qty"><button>-</button><span>0</span><button>+</button></div></div>
        <div class="card"><div><div class="card-image">Фото</div><div class="card-title">Блюдо 2</div><div class="card-price">0 ₽</div></div><div class="qty"><button>-</button><span>0</span><button>+</button></div></div>
        <div class="card"><div><div class="card-image">Фото</div><div class="card-title">Блюдо 3</div><div class="card-price">0 ₽</div></div><div class="qty"><button>-</button><span>0</span><button>+</button></div></div>
        <div class="card"><div><div class="card-image">Фото</div><div class="card-title">Блюдо 4</div><div class="card-price">0 ₽</div></div><div class="qty"><button>-</button><span>0</span><button>+</button></div></div>
      </div>
    </section>
  </div>
</body>
</html>
