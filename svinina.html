<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Свинина | Фуд Тайм</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Unbounded:wght@500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: rgba(255,255,255,.96);
      --muted: rgba(255,255,255,.74);
      --soft: rgba(255,255,255,.48);
      --glass: rgba(255,255,255,.07);
      --border: rgba(255,255,255,.12);
      --shadow: 0 18px 40px rgba(0,0,0,.24);
      --button: linear-gradient(135deg,#18b7ff 0%,#7b61ff 100%);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      padding: 22px;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 22%, rgba(255,0,128,.15), transparent 22%),
        radial-gradient(circle at 86% 14%, rgba(123,97,255,.20), transparent 24%),
        radial-gradient(circle at 52% 75%, rgba(0,255,200,.07), transparent 26%),
        radial-gradient(circle at 72% 58%, rgba(255,140,0,.06), transparent 18%),
        linear-gradient(135deg,#040506 0%,#090811 24%,#140914 50%,#0a1020 76%,#040506 100%);
    }

    .page {
      max-width: 1460px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topbar, .section-block {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brand-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 24px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .back-link, .cart-order-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 138px;
      padding: 13px 18px;
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      background: var(--button);
      border: 0;
      cursor: pointer;
    }

    .section-block { padding: 18px; }

    .mini-label {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 8px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      line-height: 1;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .section-note {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 16px;
      margin-top: 14px;
    }

    .product-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 24px;
      box-shadow: 0 14px 30px rgba(0,0,0,.14);
      min-height: 340px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      gap: 12px;
      overflow: hidden;
    }

    .product-card-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      border-radius: 18px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.09);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .product-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .product-card-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .product-card-meta {
      color: rgba(255,255,255,.72);
      font-size: 14px;
      margin-bottom: 6px;
    }

    .product-card-price {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 14px;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty button {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 12px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.08);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      flex: 0 0 38px;
    }

    .qty span {
      min-width: 24px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
    }

    .cart-float {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 999;
    }

    .cart-button {
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(135deg,#18b7ff 0%,#7b61ff 100%);
      color: #fff;
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    .cart-panel {
      display: none;
      margin-top: 12px;
      width: 320px;
      max-height: 420px;
      overflow: auto;
      padding: 16px;
      border-radius: 22px;
      background: rgba(20,20,30,.88);
      border: 1px solid rgba(255,255,255,.10);
    }

    .cart-panel.open { display: block; }

    .cart-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .cart-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
    }

    .cart-item-name {
      font-size: 14px;
      font-weight: 700;
    }

    .cart-item-meta {
      font-size: 13px;
      color: rgba(255,255,255,.72);
      margin-top: 4px;
    }

    .cart-empty {
      color: rgba(255,255,255,.65);
      font-size: 14px;
    }

    .cart-total {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: 16px;
      font-weight: 800;
    }

    @media (max-width:1180px) {
      .product-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }

    @media (max-width:820px) {
      body { padding: 16px; }

      .topbar, .section-block {
        padding: 14px;
      }

      .product-grid {
        grid-template-columns: 1fr;
      }

      .back-link, .cart-order-btn {
        width: 100%;
      }

      .cart-panel {
        width: min(88vw, 320px);
      }

      .product-card {
        min-height: auto;
        padding: 12px;
        border-radius: 18px;
        gap: 10px;
      }

      .product-card-image {
        aspect-ratio: 16 / 9;
        height: auto;
        border-radius: 14px;
        margin-bottom: 12px;
      }

      .product-card-title {
        font-size: 16px;
      }

      .product-card-meta {
        font-size: 13px;
        line-height: 1.45;
      }

      .product-card-price {
        font-size: 15px;
        margin-bottom: 12px;
      }

      .qty {
        gap: 8px;
      }

      .qty button {
        width: 34px;
        height: 34px;
        font-size: 20px;
        flex: 0 0 34px;
        border-radius: 10px;
      }

      .qty span {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <div class="brand-title">Фуд Тайм</div>
        <div class="brand-subtitle">premium food service</div>
      </div>
      <a href="index.html" class="back-link">Назад</a>
    </div>

    <section class="section-block">
      <div class="mini-label">Категория</div>
      <div class="section-title">Свинина</div>

      <div class="product-grid">
        <div class="product-card" data-name="Шейка свиная" data-price="350">
          <div>
            <div class="product-card-image">  
              <img src="img/shcheka-svinaya.PNG" alt="Шейка свиная">
            </div>
            <div class="product-card-title">Шейка свиная</div>
            <div class="product-card-meta">325 г</div>
            <div class="product-card-price">350 ₽</div>
          </div>
          <div class="qty">
            <button onclick="changeQty(this,-1)">-</button>
            <span>0</span>
            <button onclick="changeQty(this,1)">+</button>
          </div>
        </div>

        <div class="product-card" data-name="Рёбра свиные" data-price="300">
          <div>
            <div class="product-card-image">
              <img src="img/rebra-svinye.png" alt="Рёбра свиные">
            </div>
            <div class="product-card-title">Рёбра свиные</div>
            <div class="product-card-meta">250 г</div>
            <div class="product-card-price">300 ₽</div>
          </div>
          <div class="qty">
            <button onclick="changeQty(this,-1)">-</button>
            <span>0</span>
            <button onclick="changeQty(this,1)">+</button>
          </div>
        </div>

        <div class="product-card" data-name="Свинина на кости" data-price="350">
          <div>
            <div class="product-card-image">
              <img src="img/svinina-na-kosti.PNG" alt="Свинина на кости">
            </div>
            <div class="product-card-title">Свинина на кости</div>
            <div class="product-card-meta">250 г</div>
            <div class="product-card-price">350 ₽</div>
          </div>
          <div class="qty">
            <button onclick="changeQty(this,-1)">-</button>
            <span>0</span>
            <button onclick="changeQty(this,1)">+</button>
          </div>
        </div>

        <div class="product-card" data-name="Вырезка свиная" data-price="500">
          <div>
            <div class="product-card-image">
              <img src="img/vyrezka-svinaya.png" alt="Вырезка свиная">
            </div>
            <div class="product-card-title">Вырезка свиная</div>
            <div class="product-card-meta">300 г</div>
            <div class="product-card-price">500 ₽</div>
          </div>
          <div class="qty">
            <button onclick="changeQty(this,-1)">-</button>
            <span>0</span>
            <button onclick="changeQty(this,1)">+</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="cart-float">
    <button class="cart-button" onclick="toggleCart()">🛒 <span id="cartCount">0</span></button>
    <div class="cart-panel" id="cartPanel">
      <div class="cart-title">Корзина</div>
      <div class="cart-items" id="cartItems"><div class="cart-empty">Пока пусто</div></div>
      <div class="cart-total">Итого: <span id="cartTotal">0 ₽</span></div>
      <button class="cart-order-btn" style="margin-top:12px;">Оформить</button>
    </div>
  </div>

  <script>
    const CART_KEY='foodtime_cart';

    function getCart(){
      try{return JSON.parse(localStorage.getItem(CART_KEY))||{}}
      catch(e){return{}}
    }

    function saveCart(cart){
      localStorage.setItem(CART_KEY,JSON.stringify(cart))
    }

    function changeQty(button,delta){
      const card=button.closest('.product-card');
      if(!card) return;

      const name=card.dataset.name||'Товар';
      const price=Number(card.dataset.price||0);

      const cart=getCart();
      const currentQty=cart[name]?.qty||0;
      const newQty=Math.max(0,currentQty+delta);

      if(newQty===0) delete cart[name];
      else cart[name]={price,qty:newQty};

      saveCart(cart);
      updateCartUI();
    }

    function updateCartUI(){
      const cart=getCart(),
            cartItems=document.getElementById('cartItems'),
            cartCount=document.getElementById('cartCount'),
            cartTotal=document.getElementById('cartTotal');

      let totalCount=0,totalPrice=0;

      Object.entries(cart).forEach(([name,item])=>{
        totalCount+=item.qty;
        totalPrice+=item.qty*item.price;
      });

      if(cartCount) cartCount.textContent=totalCount;
      if(cartTotal) cartTotal.textContent=totalPrice+' ₽';

      if(cartItems){
        const entries=Object.entries(cart);
        cartItems.innerHTML=!entries.length
          ? '<div class="cart-empty">Пока пусто</div>'
          : entries.map(([name,item])=>`
            <div class="cart-item">
              <div>
                <div class="cart-item-name">${name}</div>
                <div class="cart-item-meta">${item.qty} × ${item.price} ₽</div>
              </div>
              <div class="cart-item-name">${item.qty*item.price} ₽</div>
            </div>
          `).join('');
      }

      document.querySelectorAll('.product-card').forEach(card=>{
        const name=card.dataset.name||'Товар';
        const qtyEl=card.querySelector('.qty span');
        if(qtyEl) qtyEl.textContent=cart[name]?.qty||0;
      });
    }

    function toggleCart(){
      document.getElementById('cartPanel').classList.toggle('open')
    }

    document.addEventListener('DOMContentLoaded',updateCartUI);
  </script>
</body>
</html>
