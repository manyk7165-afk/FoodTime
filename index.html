<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Фуд Тайм</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Unbounded:wght@500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --text: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.74);
      --soft: rgba(255,255,255,0.48);
      --button: linear-gradient(135deg, #18b7ff 0%, #7b61ff 100%);
      --chip: rgba(255,255,255,0.08);
      --chip-active: rgba(255,255,255,0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 22%, rgba(255, 0, 128, 0.15), transparent 22%),
        radial-gradient(circle at 86% 14%, rgba(123, 97, 255, 0.20), transparent 24%),
        radial-gradient(circle at 52% 75%, rgba(0, 255, 200, 0.07), transparent 26%),
        radial-gradient(circle at 72% 58%, rgba(255, 140, 0, 0.06), transparent 18%),
        linear-gradient(135deg, #040506 0%, #090811 24%, #140914 50%, #0a1020 76%, #040506 100%);
      color: var(--text);
      padding: 22px;
    }

    .page {
      max-width: 1460px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .hero,
    .section-block,
    .category-shell {
      background: rgba(16, 20, 28, 0.88);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 28px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }

    .hero {
      padding: 16px;
    }

    .top-row {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .brand-box,
    .main-box,
    .photo-box,
    .service-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-radius: 22px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.15);
    }

    .brand-box {
      min-height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px 14px;
    }

    .brand-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 25px;
      line-height: 1.1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-subtitle {
      margin-top: 10px;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.50);
    }

    .main-box {
      min-height: 190px;
      padding: 22px 24px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 16px;
      align-items: stretch;
    }

    .main-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    .main-desc {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 760px;
      margin-bottom: 18px;
    }

    .main-desc p {
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
    }

    .hero-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-btn,
    .contact-action,
    .cart-order-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 138px;
      padding: 13px 18px;
      border-radius: 16px;
      text-decoration: none;
      color: white;
      font-weight: 800;
      font-size: 15px;
      background: var(--button);
      box-shadow: 0 12px 24px rgba(0,0,0,0.20);
      border: 0;
      cursor: pointer;
    }

    .mini-label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 8px;
    }

    .contact-mini {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 100%;
    }

    .contact-title,
    .service-title,
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      line-height: 1.02;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .contact-phone {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .contact-note,
    .service-note,
    .section-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .photo-box {
      min-height: 220px;
      position: relative;
      overflow: hidden;
    }

    .slider {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 220px;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s ease;
      background-size: cover;
      background-position: center;
    }

    .slide.active {
      opacity: 1;
    }

    .slider-overlay {
      position: absolute;
      inset: auto 12px 12px 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(8, 8, 12, 0.38);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-size: 13px;
      color: rgba(255,255,255,0.88);
      z-index: 2;
    }

    .service-box {
      min-height: 220px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .schedule-lines {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .schedule-line {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
    }

    .schedule-line strong {
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
    }

    .schedule-line span {
      font-size: 15px;
      font-weight: 800;
      color: rgba(255,255,255,0.97);
    }

    .category-shell {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .category-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
      scroll-behavior: smooth;
    }

    .category-bar::-webkit-scrollbar {
      display: none;
    }

    .category-link {
      flex: 0 0 auto;
      min-width: 180px;
      height: 56px;
      padding: 0 22px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      color: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .category-link:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.08);
    }

    .category-arrow {
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.85);
      font-size: 18px;
      cursor: pointer;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .section-block {
      padding: 18px;
    }

    .hot-grid {
      display: grid;
      gap: 16px;
      margin-top: 14px;
    }

    .hot-grid-6 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .hot-pill {
      text-decoration: none;
      color: #fff;
      min-height: 112px;
      padding: 18px 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 14px 30px rgba(0,0,0,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 14px;
    }

    .product-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.14);
      overflow: hidden;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      position: relative;
    }

    .product-card-image {
      width: 100%;
      height: 130px;
      border-radius: 18px;
      background-color: rgba(255,255,255,0.06);
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      border: 1px solid rgba(255,255,255,0.09);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.38);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .product-card-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .product-card-meta {
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.55;
      white-space: pre-line;
    }

    .product-card-price {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 14px;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty button {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .qty span {
      min-width: 24px;
      text-align: center;
      font-size: 16px;
      font-weight: 800;
    }

    .daily-menu-day {
      font-size: 22px;
      font-weight: 800;
      margin: 12px 0 8px;
    }

    .daily-multi-card {
      grid-column: span 2;
      min-height: 320px;
    }

    .daily-multi-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .daily-variants-grid {
      display: grid;
      gap: 12px;
    }

    .daily-variants-grid.cols-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .daily-variants-grid.cols-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .daily-variant-box {
      background: rgba(20, 26, 36, 0.96);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 180px;
    }

    .daily-variant-name {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .daily-variant-meta {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .daily-variant-price {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .cart-float {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 999;
    }

    .cart-button {
      border: 1px solid rgba(255,255,255,0.14);
      background: linear-gradient(135deg, #18b7ff 0%, #7b61ff 100%);
      color: #fff;
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(0,0,0,0.28);
    }

    .cart-panel {
      display: none;
      margin-top: 12px;
      width: 340px;
      max-height: 560px;
      overflow: auto;
      padding: 16px;
      border-radius: 22px;
      background: rgba(20, 20, 30, 0.88);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .cart-panel.open {
      display: block;
    }

    .cart-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .cart-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .cart-item-name {
      font-size: 14px;
      font-weight: 700;
    }

    .cart-item-meta {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      margin-top: 4px;
    }

    .cart-empty {
      color: rgba(255,255,255,0.65);
      font-size: 14px;
    }

    .cart-total {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 16px;
      font-weight: 800;
    }

    .cart-comment-wrap {
      margin-top: 14px;
    }

    .cart-comment-label {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.92);
    }

    .cart-comment {
      width: 100%;
      min-height: 84px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: #fff;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }

    .cart-comment::placeholder {
      color: rgba(255,255,255,0.42);
    }

    .option-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
    }

    .option-check input {
      width: 16px;
      height: 16px;
      accent-color: #7b61ff;
    }

    .variant-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 10px;
    }

    .variant-btn {
      border: 1px solid rgba(255,255,255,0.10);
      background: var(--chip);
      color: #fff;
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .variant-btn.active {
      background: var(--chip-active);
      border-color: rgba(255,255,255,0.22);
    }
